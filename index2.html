<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spatial Echo | Live Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #f2eee3; --ink: #1a1a1a; --texture: url('https://www.transparenttextures.com/patterns/cream-paper.png'); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #d9d4c7; font-family: 'Space Mono', monospace; display: flex; align-items: center; justify-content: center; }
        
        .folder { position: relative; width: 380px; height: 600px; background: var(--paper); background-image: var(--texture); border-radius: 0 20px 20px 20px; box-shadow: 20px 20px 60px rgba(0,0,0,0.2); display: flex; flex-direction: column; align-items: center; padding: 30px; box-sizing: border-box; }

        /* 左侧主 Tab (已锁定名字) */
        .tab-left { position: absolute; left: -35px; top: 40px; width: 35px; height: 180px; background: var(--paper); background-image: var(--texture); border-radius: 12px 0 0 12px; display: flex; align-items: center; justify-content: center; opacity: 0.5; }
        .tab-left-text { transform: rotate(-90deg); white-space: nowrap; font-size: 13px; font-weight: 700; letter-spacing: 3px; color: var(--ink); text-transform: uppercase; }

        /* 右侧动态弹出 Tab (Act 2 的灵魂) */
        .tabs-right { position: absolute; right: -32px; top: 60px; display: flex; flex-direction: column; gap: 8px; }
        .echo-tab { width: 32px; height: 95px; background: #e6e2d6; background-image: var(--texture); border: 1px solid rgba(0,0,0,0.08); border-radius: 0 12px 12px 0; display: flex; align-items: center; justify-content: center; cursor: pointer; writing-mode: vertical-rl; text-orientation: mixed; font-size: 10px; font-weight: 700; color: var(--ink); transition: width 0.3s; }
        .echo-tab.active { background: #dcd8cc; width: 42px; border-left: none; box-shadow: 5px 5px 15px rgba(0,0,0,0.05); }

        /* Camera Window */
        .camera-window { width: 100%; aspect-ratio: 3 / 4; background: #000; border: 1px solid rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; }
        #camera-feed { width: 100%; height: 100%; object-fit: cover; }

        /* 下方剧本区域 */
        .content-area { text-align: left; width: 100%; }
        .label { font-size: 9px; opacity: 0.5; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .teaser { font-size: 11px; line-height: 1.6; border-left: 3px solid var(--ink); padding-left: 12px; margin-bottom: 20px; min-height: 60px; }
        
        .unfold-btn { width: 100%; background: none; border: 1.5px solid var(--ink); padding: 12px; font-family: inherit; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; }

        /* 初始加载遮罩 */
        #loading-view { position: absolute; inset: 0; background: var(--paper); background-image: var(--texture); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 0 20px 20px 20px; }
        .spinner { width: 25px; height: 25px; border: 2px solid var(--ink); border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="folder">
        <div class="tab-left"><div class="tab-left-text">Spatial Echo</div></div>

        <div class="tabs-right" id="tabs-container"></div>

        <div class="camera-window"><video id="camera-feed" autoplay playsinline></video></div>

        <div class="content-area">
            <p class="label" id="echo-meta">Detecting context...</p>
            <div class="teaser" id="echo-teaser">Fetching overlapping consciousness...</div>
            <button class="unfold-btn" onclick="goToAct3()">Unfold Archive</button>
        </div>

        <div id="loading-view">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-size: 10px; letter-spacing: 1px;">DECODING SPATIAL DATA...</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>{video.srcObject=s;});

        let echoData = [];

        // 核心：模拟调用 Gemini/Places API 基于真实定位生成内容
        async function fetchRealEchoes() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                // 在真正的产品中，这里会 fetch(your-api-endpoint) 
                // 现在我用一个“逻辑生成器”来模拟：如果接近 Berkeley 坐标，显示校园故事；如果是其他地方，显示通用城市档案
                const isBerkeley = lat.toFixed(1) == 37.9 && lon.toFixed(1) == -122.3;
                
                if(isBerkeley) {
                    echoData = [
                        { tab: "1923", meta: "History / Architecture", text: "You are the courier. The blueprints for the Campanile are hidden in plain sight. Find the symbols." },
                        { tab: "1964", meta: "Social / Movement", text: "The air is vibrant. You are a student journalist at the birth of the Free Speech Movement. Document the change." },
                        { tab: "2049", meta: "Future / Eco-Lab", text: "The hills have returned to wild forest. You are a biological scout searching for the last digital library seed." }
                    ];
                } else {
                    echoData = [
                        { tab: "PAST", meta: "Historical Layer", text: "An echo of the original foundation. You are a surveyor mapping this specific coordinate before the city grew." },
                        { tab: "FILM", meta: "Cinematic Layer", text: "In an unreleased script, this very spot was the site of a silent meeting. You are the protagonist waiting for a sign." },
                        { tab: "VOID", meta: "Speculative Layer", text: "A glitch in time. You are a consciousness from the year 2105, seeing this street as a museum of the pre-digital era." }
                    ];
                }

                renderTabs();
                document.getElementById('loading-view').style.display = 'none';
            });
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            echoData.forEach((echo, index) => {
                const div = document.createElement('div');
                div.className = `echo-tab ${index === 0 ? 'active' : ''}`;
                div.innerText = echo.tab;
                div.onclick = (e) => selectEcho(index, e);
                container.appendChild(div);
            });
            selectEcho(0);
        }

        function selectEcho(index, e) {
            const data = echoData[index];
            document.getElementById('echo-meta').innerText = data.meta;
            document.getElementById('echo-teaser').innerText = data.text;
            
            document.querySelectorAll('.echo-tab').forEach(t => t.classList.remove('active'));
            if(e) e.target.classList.add('active');
            
            // 将选择的数据存入 Session，传给第三页
            sessionStorage.setItem('selectedEcho', JSON.stringify(data));
        }

        function goToAct3() {
            window.location.href = 'index3.html';
        }

        fetchRealEchoes();
    </script>
</body>
</html>

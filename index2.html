<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spatial Echo | Identity Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #f2eee3; --ink: #1a1a1a; --texture: url('https://www.transparenttextures.com/patterns/cream-paper.png'); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #d9d4c7; font-family: 'Space Mono', monospace; display: flex; align-items: center; justify-content: center; }
        
        /* THE FOLDER: Now at 75% width */
        .folder { 
            position: relative; 
            width: 75%; /* Unified Width */
            max-width: 320px; 
            height: 75vh; 
            background: var(--paper); 
            background-image: var(--texture); 
            border-radius: 0 15px 15px 15px; 
            box-shadow: 20px 20px 60px rgba(0,0,0,0.15); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 30px 20px; 
            box-sizing: border-box; 
        }
        /* Left Tab (Fixed) */
        .tab-left { position: absolute; left: -26px; top: 40px; width: 26px; height: 160px; background: var(--paper); border-radius: 12px 0 0 12px; display: flex; align-items: center; justify-content: center; opacity: 0.4; pointer-events: none; margin-left: -1px; }
        .tab-left-text { transform: rotate(-90deg); white-space: nowrap; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--ink); text-transform: uppercase; }

        /* Right Tabs Container */
        .tabs-right { 
            position: absolute; 
            right: 0; 
            top: 60px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        
        /* FIXED: Tabs are smaller (width 26px) and have negative margin to snap to outer edge */
        .echo-tab { 
            width: 26px; 
            height: 80px; 
            background: #e6e2d6; 
            border-radius: 0 10px 10px 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            writing-mode: vertical-rl; 
            text-orientation: mixed; 
            font-size: 9px; 
            font-weight: 700; 
            color: var(--ink); 
            border: 1px solid rgba(0,0,0,0.08); 
            border-left: none;
            margin-right: -26px; /* Snaps to outer edge */
            transition: margin-right 0.2s;
        }
        
        /* FIXED: Active tab pops out, still safe within the 75% boundary */
        .echo-tab.active { 
            background: #dcd8cc; 
            margin-right: -32px; /* Pops out further */
        }

        .camera-window { width: 100%; aspect-ratio: 3 / 4; background: #000; border: 1px solid rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 25px; }
        #camera-feed { width: 100%; height: 100%; object-fit: cover; }

        .content-area { text-align: left; width: 100%; }
        .label { font-size: 9px; font-weight: 700; color: var(--ink); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1.5px solid rgba(0,0,0,0.1); padding-bottom: 4px; display: inline-block; }
        .teaser { font-size: 11px; line-height: 1.6; border-left: 3px solid var(--ink); padding-left: 12px; margin-bottom: 20px; min-height: 85px; color: var(--ink); }

        /* FIXED: Button text color is now black (--ink) */
        .unfold-btn { 
            width: 100%; 
            border: 1.5px solid var(--ink); 
            padding: 12px; 
            font-family: inherit; 
            font-size: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: var(--ink); /* Fixed Color */
            background: none;
            cursor: pointer;
        }
        
        #loading { position: absolute; inset: 0; background: var(--paper); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 0 15px 15px 15px; }
        .spinner { width: 25px; height: 25px; border: 2px solid var(--ink); border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="folder">
        <div class="tab-left"><div class="tab-left-text">Spatial Echo</div></div>
        <div class="tabs-right" id="tabs-container"></div>
        <div class="camera-window"><video id="camera-feed" autoplay playsinline></video></div>
        <div class="content-area">
            <p class="label" id="echo-title">Detecting...</p>
            <div class="teaser" id="echo-teaser">Recalibrating spatial consciousness...</div>
            <button class="unfold-btn" onclick="window.location.href='index3.html'">Unfold Act</button>
        </div>
        <div id="loading"><div class="spinner"></div><p style="margin-top:15px; font-size:9px;">SYNCING LOCALITY...</p></div>
    </div>

<script>
    const video = document.getElementById('camera-feed');
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>{video.srcObject=s;});

    const archiveDatabase = {
        Berkeley: [
            { tab: "1942", title: "OPPENHEIMER'S OFFICE", role: "THE PHYSICIST", act1: "<b>YOU ARE J. ROBERT OPPENHEIMER.</b> The equations for the Manhattan Project are nearly complete. <b>YOU ARE GOING TO WALK PAST THE CAMPANILE.</b> Keep your head down; the theory depends on your silence.", act2: "<b>ARRIVED AT LECONTE HALL.</b> Look at the tower. You are witnessing the watershed of human power." },
            { tab: "1964", title: "FREE SPEECH MOVEMENT", role: "THE PROTESTER", act1: "<b>YOU ARE A STUDENT AT BERKELEY.</b> Mario Savio has just climbed onto the police car. <b>YOU ARE GOING TO WALK TOWARD THE STEPS.</b> Refuse to move until they hear you.", act2: "<b>ARRIVED AT SPROUL HALL STEPS.</b> Stop and feel the power. Sit down; your silence is the loudest speech of all." },
            { tab: "1967", title: "THE GRADUATE (SET)", role: "THE ACTOR", act1: "<b>YOU ARE DUSTIN HOFFMAN.</b> It's 1967, Scene 14. <b>YOU ARE GOING TO WALK ACROSS STRAWBERRY CREEK</b> repeatedly until the director is satisfied.", act2: "<b>ARRIVED AT FACULTY CLUB BRIDGE.</b> Embrace the alienation. You aren't just an actor; you are a drifter." }
        ],
        General: [
            { tab: "ARCHV", title: "Historical Fragment", role: "THE CHRONICLER", act1: "<b>YOU ARE A TEMPORAL CHRONICLER.</b> Gemini has detected a resonance. <b>YOU ARE GOING TO EXTRACT THE STORY.</b> Observe the architectural patterns.", act2: "<b>ARRIVED AT THE CORE.</b> Observe the oldest structure nearby. You are extracting the phantom memory." },
            { tab: "FILM", title: "Uncut Cinema", role: "THE CINEMATOGRAPHER", act1: "<b>YOU ARE A DIRECTOR IN SEARCH OF A LOCATION.</b> <b>YOU ARE GOING TO SCOUT THE SCENE.</b> Find where the shadow hits the pavement.", act2: "<b>SET REACHED.</b> Feel the black-and-white texture. You aren't a tourist; you are filming a masterpiece." }
        ]
    };

    function loadContext() {
        // Force clear old storage once
        localStorage.clear();
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            // Since you are in Berkeley, this will trigger the Berkeley set.
            let echoes = (lat > 37.8 && lat < 37.9) ? archiveDatabase.Berkeley : archiveDatabase.General;
            render(echoes);
            document.getElementById('loading').style.display = 'none';
        }, (err) => {
            render(archiveDatabase.General);
            document.getElementById('loading').style.display = 'none';
        });
    }

    function render(data) {
        const container = document.getElementById('tabs-container');
        container.innerHTML = "";
        data.forEach((echo, index) => {
            const div = document.createElement('div');
            div.className = `echo-tab ${index === 0 ? 'active' : ''}`;
            div.innerText = echo.tab;
            div.onclick = (e) => {
                document.querySelectorAll('.echo-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById('echo-title').innerText = echo.title;
                document.getElementById('echo-teaser').innerHTML = echo.act1;
                localStorage.setItem('selectedStory', JSON.stringify(echo));
            };
            container.appendChild(div);
        });
        document.getElementById('echo-title').innerText = data[0].title;
        document.getElementById('echo-teaser').innerHTML = data[0].act1;
        localStorage.setItem('selectedStory', JSON.stringify(data[0]));
    }
    loadContext();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spatial Echo | Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #f2eee3; --ink: #1a1a1a; --texture: url('https://www.transparenttextures.com/patterns/cream-paper.png'); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #d9d4c7; font-family: 'Space Mono', monospace; display: flex; align-items: center; justify-content: center; }
        
        .folder { position: relative; width: 82%; max-width: 340px; height: 75vh; max-height: 600px; background: var(--paper); background-image: var(--texture); border-radius: 0 15px 15px 15px; box-shadow: 20px 20px 60px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; padding: 30px 20px; box-sizing: border-box; }

        .tab-left { position: absolute; left: -32px; top: 40px; width: 32px; height: 160px; background: var(--paper); border-radius: 12px 0 0 12px; display: flex; align-items: center; justify-content: center; opacity: 0.4; }
        .tab-left-text { transform: rotate(-90deg); white-space: nowrap; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--ink); text-transform: uppercase; }

        .tabs-right { position: absolute; right: -32px; top: 60px; display: flex; flex-direction: column; gap: 8px; }
        .echo-tab { width: 32px; height: 90px; background: #e6e2d6; border-radius: 0 12px 12px 0; display: flex; align-items: center; justify-content: center; cursor: pointer; writing-mode: vertical-rl; text-orientation: mixed; font-size: 10px; font-weight: 700; color: var(--ink); transition: width 0.2s; border: 1px solid rgba(0,0,0,0.08); }
        .echo-tab.active { background: #dcd8cc; width: 42px; border-left: none; }

        .camera-window { width: 100%; aspect-ratio: 3 / 4; background: #000; border: 1px solid rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 25px; }
        #camera-feed { width: 100%; height: 100%; object-fit: cover; }

        .content-area { text-align: left; width: 100%; }
        .label { font-size: 9px; font-weight: 700; color: var(--ink); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 4px; display: inline-block; }
        .teaser { font-size: 11px; line-height: 1.6; border-left: 3px solid var(--ink); padding-left: 12px; margin-bottom: 20px; min-height: 85px; }
        .unfold-btn { width: 100%; background: none; border: 1.5px solid var(--ink); padding: 12px; font-family: inherit; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; }

        #loading { position: absolute; inset: 0; background: var(--paper); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 0 15px 15px 15px; }
    </style>
</head>
<body>

    <div class="folder">
        <div class="tab-left"><div class="tab-left-text">Spatial Echo</div></div>
        <div class="tabs-right" id="tabs-container"></div>
        <div class="camera-window"><video id="camera-feed" autoplay playsinline></video></div>
        <div class="content-area">
            <p class="label" id="echo-title">Detecting Identity...</p>
            <div class="teaser" id="echo-teaser">Recalibrating spatial consciousness...</div>
            <button class="unfold-btn" onclick="window.location.href='index3.html'">Unfold Act</button>
        </div>
        <div id="loading">SYNCING LOCALITY...</div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>{video.srcObject=s;});

        // 这个对象包含了全量的 JSON 数据 (12核心 + 3通用)
        const archiveDatabase = {
            NYC: [
                { tab: "1922", title: "THE GATSBY PARTY", role: "THE UNINVITED GUEST", act1: "<b>YOU ARE JAY GATSBY.</b> The party is too loud. You have left the long island dock and are searching for a quiet pier on the Hudson. <b>YOU ARE GOING TO WALK TOWARD THE WATER.</b>", act2: "<b>到达码头边缘！</b> 停下，凝视哈德逊河。你会在对岸看到那道闪烁的绿光。这不仅是光，它是未来。" },
                { tab: "1945", title: "V-J DAY Kiss", role: "THE SAILOR", act1: "<b>YOU ARE A NAVY SAILOR.</b> People are flooding the streets of Manhattan. It’s V-J Day, and you feel a sudden need for human connection. <b>YOU ARE GOING TO WALK ALONG BROADWAY.</b>", act2: "<b>到达时代广场南方！</b> 停下，感受这份爆发的快乐。现在，去寻找那个值得分享这一刻和平的人。" },
                { tab: "1977", title: "THE BLACKOUT", role: "THE CITY WATCHER", act1: "<b>YOU ARE A NEW YORKER IN 1977.</b> The city is dark. The grid has failed. <b>YOU ARE GOING TO NAVIGATE THE STREETS USING ONLY MOONLIGHT.</b> Move carefully toward the nearest subway station.", act2: "<b>到达变电站附近！</b> 停下，感受这份集体的沉默。在没有电的环境下，你就是这座城市的幽灵测绘员。" }
            ],
            SF: [
                { tab: "1958", title: "VERTIGO (SCENE 22)", role: "THE DETECTIVE", act1: "<b>YOU ARE SCOTTIE FERGUSON.</b> The fog is rolling in from the Bay. You are following Madeleine. <b>YOU ARE GOING TO WALK TOWARD THE WATER.</b> Do not lose sight of the grey suit among the trees.", act2: "<b>到达金门大桥下！</b> 停下，凝视水面。就像 Madeleine 做的那样，保持这份致命的凝视。" },
                { tab: "1967", title: "SUMMER OF LOVE", role: "THE DREAMER", act1: "<b>YOU ARE A HAIGHT-ASHBURY RESIDENT.</b> The air smells of incense. <b>YOU ARE GOING TO JOIN THE HUMAN BE-IN.</b> Walk toward the sound of the acoustic guitar.", act2: "<b>到达金门公园！</b> 停下，感受这份嬉皮士的和平与爱。你就是这个时代的漫步者，也是时代的替身。" },
                { tab: "1906", title: "THE GREAT QUAKE", role: "THE SURVIVOR", act1: "<b>YOU ARE A SURVIVOR.</b> The ground has stopped moving, but the city is unrecognizable. <b>YOU ARE GOING TO FIND YOUR FAMILY.</b> Navigate the cracks in the pavement.", act2: "<b>到达宫殿酒店！</b> 停下，感受这份集体的创伤与重建。你就是这座城市的幽灵，一个时空的见证者。" }
            ],
            LA: [
                { tab: "1952", title: "SINGIN' IN THE RAIN", role: "THE MOVIE STAR", act1: "<b>YOU ARE DON LOCKWOOD.</b> It’s a rainy Hollywood night, and you are feeling euphoric. <b>YOU ARE GOING TO DANCE.</b> Find a vertical post or a curb to lean on.", act2: "<b>到达孤零零的路灯下！</b> 停下，收起雨伞。绕着灯杆旋转。这一刻，你就是电影史上的永恒风景。" },
                { tab: "1932", title: "HOLLYWOODLAND", role: "THE DEVELOPER", act1: "<b>YOU ARE A LAND DEVELOPER IN 1932.</b> The sign on the hill still says 'HOLLYWOODLAND'. <b>YOU ARE GOING TO SURVEY THE VALLEY.</b> Imagine this dusty canyon as the world's dreams.", act2: "<b>到达好莱坞标志底部！</b> 停下，俯瞰整个山谷。你不仅仅是在测绘土地，你是在创造一个神话。" },
                { tab: "1982", title: "BLADE RUNNER SET", role: "THE BLADE RUNNER", act1: "<b>YOU ARE RICK DECKARD.</b> The year is 1982, but you are filming 2019. The Bradbury Building is ahead. <b>YOU ARE GOING TO ENTER THE SHADOWS.</b> Watch the neon reflections on the wet asphalt.", act2: "<b>到达布拉德伯里大楼！</b> 停下，抬头看那标志性的玻璃天穹。现实与未来的边界在此刻消融。" }
            ],
            Berkeley: [
                { tab: "1942", title: "OPPENHEIMER'S OFFICE", role: "THE PHYSICIST", act1: "<b>YOU ARE J. ROBERT OPPENHEIMER.</b> The equations for the Manhattan Project are nearly complete. <b>YOU ARE GOING TO WALK PAST THE CAMPANILE.</b> Keep your head down, the theory depends on your silence.", act2: "<b>到达 LeConte Hall！</b> 停下，望向 Campanile 塔。你正在见证人类力量的分水岭。" },
                { tab: "1964", title: "FREE SPEECH MOVEMENT", role: "THE PROTESTER", act1: "<b>YOU ARE A STUDENT AT BERKELEY.</b> Mario Savio has just climbed onto the police car. <b>YOU ARE GOING TO SIT DOWN ON THE COLD PAVEMENT.</b> refuse to move until they hear you.", act2: "<b>到达 Sproul Hall Steps！</b> 停下，感受这份集体的力量。你的存在就是一种言论。" },
                { tab: "1967", title: "THE GRADUATE (SET)", role: "THE ACTOR", act1: "<b>YOU ARE DUSTIN HOFFMAN.</b> It's 1967, Scene 14. <b>YOU ARE GOING TO WALK ACROSS STRAWBERRY CREEK.</b> repeatedly until the director is satisfied.", act2: "<b>到达 Faculty Club Bridge！</b> 停下，感受这份疏离感。你不仅仅是一个演员，你是一个时代的迷失者。" }
            ],
            General: [
                { tab: "ARCHV", title: "Historical Fragment", role: "THE CHRONICLER", act1: "<b>YOU ARE A TEMPORAL CHRONICLER.</b> Gemini has detected a cultural resonance. <b>YOU ARE GOING TO EXTRACT THE STORY.</b> Observe the architectural patterns around you.", act2: "<b>到达文化档案核心点！</b> 停下，观察周围最古老的建筑。你正在提取这座城市的幽灵记忆。" },
                { tab: "FILM", title: "Uncut Cinema", role: "THE CINEMATOGRAPHER", act1: "<b>YOU ARE A DIRECTOR IN SEARCH OF A LOCATION.</b> <b>YOU ARE GOING TO SCOUT THE SCENE.</b> Find the point where the shadow hits the pavement and wait.", act2: "<b>到达电影取景点！</b> 停下，感受这份黑白电影的质感。你不是一个游客，你正在拍摄一部关于这个地点的电影。" },
                { tab: "DOCS", title: "Spatial Record", role: "THE ARCHIVIST", act1: "<b>YOU ARE AN ARCHIVIST FROM THE FUTURE.</b> <b>YOU ARE GOING TO RECORD THE PERSISTENCE OF SPACE.</b> Walk toward the center of the block and stand still.", act2: "<b>到达空间测绘点！</b> 停下，闭上眼睛10秒钟。你正在上传这个空间的持久记忆。" }
            ]
        };

        async function loadContext() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude.toFixed(1);
                // 城市判定路由
                let echoes = archiveDatabase.General;
                if (lat == 37.8 || lat == 37.9) echoes = archiveDatabase.Berkeley;
                else if (lat == 37.7) echoes = archiveDatabase.SF;
                else if (lat == 34.0) echoes = archiveDatabase.LA;
                else if (lat == 40.7) echoes = archiveDatabase.NYC;

                render(echoes);
                document.getElementById('loading').style.display = 'none';
            });
        }

        function render(data) {
            const container = document.getElementById('tabs-container');
            data.forEach((echo, index) => {
                const div = document.createElement('div');
                div.className = `echo-tab ${index === 0 ? 'active' : ''}`;
                div.innerText = echo.tab;
                div.onclick = (e) => {
                    document.querySelectorAll('.echo-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    document.getElementById('echo-title').innerText = echo.title;
                    // 在此页只显示 Act I 剧本
                    document.getElementById('echo-teaser').innerHTML = echo.act1;
                    localStorage.setItem('selectedStory', JSON.stringify(echo));
                };
                container.appendChild(div);
            });
            // Initial render
            document.getElementById('echo-title').innerText = data[0].title;
            document.getElementById('echo-teaser').innerHTML = data[0].act1;
            localStorage.setItem('selectedStory', JSON.stringify(data[0]));
        }

        loadContext();
    </script>
</body>
</html>

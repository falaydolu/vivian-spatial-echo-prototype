<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spatial Echo | Archive</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper: #f2eee3;
            --ink: #1a1a1a;
            --texture: url('https://www.transparenttextures.com/patterns/cream-paper.png');
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #d9d4c7; /* 桌面背景色 */
            font-family: 'Space Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 文件夹主体：缩小宽度至 80% 确保 Tab 可见 */
        .folder {
            position: relative;
            width: 75%; 
            max-width: 340px; 
            height: 75vh; 
            max-height: 600px;
            background-color: var(--paper);
            background-image: var(--texture);
            border-radius: 0 20px 20px 20px;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        /* 左侧 Tab: Spatial Echo */
        .tab {
            position: absolute;
            left: -32px; /* 负边距让它长在框外面 */
            top: 40px;
            width: 32px;
            height: 160px;
            background-color: var(--paper);
            background-image: var(--texture);
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.05);
        }

        .tab-text {
            transform: rotate(-90deg);
            white-space: nowrap;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--ink);
            text-transform: uppercase;
        }

        /* 摄像头视口 */
        .camera-window {
            width: 100%;
            aspect-ratio: 3 / 4;
            background: #000;
            border: 1px solid rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 30px;
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 底部操作按钮 */
        .find-btn {
            background-color: var(--ink);
            color: #ffffff;
            border: none;
            padding: 15px 30px;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
        }

        /* 加载遮罩 */
        #loader {
            position: absolute;
            inset: 0;
            background: var(--paper);
            background-image: var(--texture);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 0 20px 20px 20px;
            text-align: center;
        }

        .spinner {
            width: 25px; height: 25px;
            border: 2px solid var(--ink);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="folder">
        <div class="tab">
            <div class="tab-text">Spatial Echo</div>
        </div>

        <div class="camera-window">
            <video id="camera-feed" autoplay playsinline></video>
        </div>

        <button class="find-btn" onclick="startScanning()">Find Archive</button>

        <div id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 20px; font-size: 9px; letter-spacing: 1px;" id="loader-msg">INITIALIZING SCAN...</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');

        // 启动摄像头
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
            } catch (err) {
                console.log("Camera access denied");
            }
        }

        startCamera();

        function startScanning() {
            const loader = document.getElementById('loader');
            const loaderMsg = document.getElementById('loader-msg');
            loader.style.display = 'flex';

            // 模拟地理位置获取
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    loaderMsg.innerText = "COORDINATES LOCKED. DECODING...";
                    setTimeout(() => { window.location.href = 'index2.html'; }, 1500);
                }, () => {
                    // 失败兜底
                    loaderMsg.innerText = "GPS WEAK. USING CACHED DATA...";
                    setTimeout(() => { window.location.href = 'index2.html'; }, 1500);
                });
            } else {
                setTimeout(() => { window.location.href = 'index2.html'; }, 1500);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spatial Echo | The Act</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #f2eee3; --ink: #1a1a1a; --texture: url('https://www.transparenttextures.com/patterns/cream-paper.png'); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Space Mono', monospace; }

        /* Full Screen Reality */
        #camera-bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* Script Paper (Bottom) */
        .script-paper {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background-color: var(--paper);
            background-image: var(--texture);
            z-index: 10;
            padding: 40px 25px 60px 25px;
            box-sizing: border-box;
            border-top: 2px solid var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
        }

        .scene-header {
            font-size: 9px;
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 25px;
            opacity: 0.5;
        }

        .script-body { max-width: 300px; color: var(--ink); }
        .role-title { font-size: 16px; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .stage-direction { font-size: 13px; font-style: italic; line-height: 1.6; margin-bottom: 20px; display: block; opacity: 0.9; }
        .mission-instruction { font-size: 13px; line-height: 1.6; font-weight: 400; display: block; }

        .exit-link {
            margin-top: 35px;
            font-size: 10px;
            text-decoration: underline;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <video id="camera-bg" autoplay playsinline></video>

    <div class="script-paper">
        <div class="scene-header" id="scene-meta">Session Live</div>
        
        <div class="script-body">
            <span class="role-title" id="role-name">The Protagonist</span>
            
            <span class="stage-direction" id="stage-desc">
                Loading spatial context...
            </span>
            
            <span class="mission-instruction" id="mission-text">
                Syncing with the local echo. Please wait.
            </span>
        </div>

        <div class="exit-link" onclick="window.location.href='index.html'">Close Archive</div>
    </div>

    <script>
        // Start Camera
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
            .then(s => { document.getElementById('camera-bg').srcObject = s; });

        // Load content from localStorage
        window.onload = () => {
            const data = JSON.parse(localStorage.getItem('selectedStory'));
            if (data) {
                document.getElementById('scene-meta').innerText = `Spatial Connection: ${data.tab}`;
                
                if (data.tab === "1920s") {
                    document.getElementById('role-name').innerText = "THE COURIER";
                    document.getElementById('stage-desc').innerText = "You are in Berkeley, 1923. The stone is fresh, the world is quiet. You feel the weight of a secret in your satchel.";
                    document.getElementById('mission-text').innerText = "You are going to find the architect's mark on the north pillar. Do not let the passersby see you linger.";
                } else if (data.tab === "1964s") {
                    document.getElementById('role-name').innerText = "THE WITNESS";
                    document.getElementById('stage-desc').innerText = "You are in Berkeley, 1964. The air is electric with the sound of a thousand voices. You are holding the truth in your hands.";
                    document.getElementById('mission-text').innerText = "You are going to document the speaker on the megaphone. Position yourself where the sun meets the shadow.";
                } else {
                    document.getElementById('role-name').innerText = "THE SCOUT";
                    document.getElementById('stage-desc').innerText = "You are in Berkeley, 2049. Concrete has surrendered to digital vines. The city breathes with you.";
                    document.getElementById('mission-text').innerText = "You are going to retrieve the lost server seed. It is buried near the roots of the central oak. Scan carefully.";
                }
            }
        };
    </script>
</body>
</html>
